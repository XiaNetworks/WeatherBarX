name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build and run unit tests
        run: |
          xcodebuild \
            -project WeatherBarX.xcodeproj \
            -scheme WeatherBarX \
            -configuration Debug \
            -destination 'platform=macOS' \
            -skip-testing:WeatherBarXUITests \
            test
